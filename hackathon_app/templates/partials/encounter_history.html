<section class="panel overflow-hidden">
  <div class="px-5 py-4 border-b border-slate-200"><h3 class="font-bold">診察履歴</h3></div>
  <div class="divide-y divide-slate-100">
    {% for encounter in encounters %}
    <div class="flex items-center justify-between px-5 py-4 hover:bg-slate-50">
      <a href="/encounters/{{ encounter.id }}" class="flex-1 min-w-0">
        <div class="font-semibold">第{{ store.encounter_number(encounter.id) }}回</div>
        <div class="text-xs text-slate-500">{{ encounter.created_at }}</div>
      </a>
      <div class="flex items-center gap-3 ml-4">
        <span class="text-sm text-slate-600">{{ status_labels.get(encounter.status, encounter.status) }}</span>
        {% if encounter.status in ['draft', 'confirmed'] %}
        <a href="/encounters/{{ encounter.id }}/chart" class="btn-secondary text-xs py-1 px-3">カルテ</a>
        {% endif %}
      </div>
    </div>
    {% else %}
    <div class="px-5 py-8 text-slate-500">診察履歴はありません。</div>
    {% endfor %}
  </div>
</section>
