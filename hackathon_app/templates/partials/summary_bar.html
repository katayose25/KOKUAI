<section class="grid grid-cols-2 md:grid-cols-6 gap-3">
  {% for key, label in summary.category_labels.items() %}
  <div class="metric-card">
    <span>{{ label }}</span>
    <strong>{{ summary.counts.get(key, 0) }}</strong>
  </div>
  {% endfor %}
  <div class="metric-card bg-slate-900 text-white border-slate-900">
    <span>合計 / 確認済み</span>
    <strong>{{ summary.total }} / {{ summary.confirmed }}</strong>
  </div>
</section>
